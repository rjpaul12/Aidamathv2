<div id="game-view" class="view hidden">
    <div class="monitor-layout">
        
        <div class="monitor-left">
            
            <div class="zone-leaderboard" style="background: #ff9f9f; padding: 15px; border-radius: 10px; border: 1px solid #d8adad;">
                <h3 style="text-align:center; color: #222222; margin: 0 0 10px 0; letter-spacing: 2px;">LEADERBOARD</h3>
                <div style="display: flex; gap: 5px; margin-bottom: 10px; justify-content: center;">
                    <button class="btn active" onclick="loadGameLeaderboard('ai')" style="padding: 5px 10px; font-size: 0.6rem;">VS AI</button>
                    <button class="btn btn-outline" onclick="loadGameLeaderboard('pvp')" style="padding: 5px 10px; font-size: 0.6rem;">PVP</button>
                </div>
                <div style="overflow-y: auto; max-height: 120px;">
                    <table style="width: 100%; border-collapse: collapse; font-size: 0.75rem; color: #dddddd;">
                        <tbody id="game-leaderboard-body" style="text-align: center;">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="zone-board">
                <div class="game-container">
                    <div id="board" class="board"></div>
                </div>
            </div>

        </div>

        <div class="monitor-right">
            
            <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 15px; border-bottom: 2px solid #ffffff; padding-bottom: 10px;">
                <button class="btn btn-outline" onclick="showView('main-menu')" style="font-size: 0.7rem; padding: 5px 10px; border-color: #ff4b2b; color: #ff4b2b;">✕ EXIT</button>
                <div style="display: flex; gap: 20px; font-family: 'Courier New', monospace; font-weight: bold; align-items: center;">
                    <div style="color: #ffffff;">MOVE: <span id="move-timer" style="color: #ffffff; font-size: 1.2rem;">60</span>s</div>
                    <div style="color: #d130eb;">GAME: <span id="game-timer" style="color: #ffffff; font-size: 1.2rem;">20:00</span></div>
                </div>
                <button class="btn" onclick="startGame(currentMode)" style="font-size: 0.7rem; padding: 5px 10px;">↻ RESTART</button>
            </div>

            <div class="hud-container" style="width: 100%; margin-bottom: 10px;">
                <div class="hud-panel player-side" style="height: 40px;">
                    <div class="hud-top-strip"></div>
                    <div class="hud-content" style="padding: 2px 20px;"><div class="hud-name" id="p1-name-display" style="color:#ffffff;">PLAYER</div></div>
                </div>
                <div class="hud-center" style="height: 45px; width: 80px;">
                    <div class="vs-text" style="font-size: 1.2rem; color: #ffffff;">VS</div>
                </div>
                <div class="hud-panel ai-side" style="height: 40px;">
                    <div class="hud-top-strip"></div>
                    <div class="hud-content" style="padding: 2px 20px;"><div class="hud-name" id="p2-name-display" style="color:#ffffff;">COMPUTER</div></div>
                </div>
            </div>

            <div class="huge-score-display">
                <span id="p-score-huge" class="score-text blue" style="color: #ffffff;">0</span>
                <span class="vs-divider" style="color: #cccccc;">VS</span>
                <span id="ai-score-huge" class="score-text red" style="color: #ffffff;">0</span>
            </div>

            <div id="history-panel" style="width: 90%; height: 120px; background: #828181; border: 1px solid #dedbdb; border-radius: 5px; padding: 10px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.7rem; margin-top: auto; margin-bottom: 10px; color: #333333;">
                <div id="history-list" style="display: flex; flex-direction: column; gap: 3px;"></div>
            </div>

        </div>
    </div>
</div>
